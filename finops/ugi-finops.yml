description: 'FOCUS-aligned FinOps for UGI: regulated-utility holding company; no public API pricing
  or usage-meter surface. Spend mapping is contract-driven and reconciled per integration agreement.'
notes: UGI has no public developer portal or pricing surface. Meters and FOCUS columns are placeholders
  pending reconciliation against actual contract invoices.
