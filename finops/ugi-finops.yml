meters:
  - name: contract_term
    description: Active partner integration contract period
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Reconcile spend from contracted utility data-sharing agreements; UGI does not expose
      a public usage telemetry surface.
  - name: Allocation
    description: Allocate per consuming line of business (gas distribution, AmeriGas propane, electric)
      per the contract scope.
  - name: Optimization
    description: Re-scope the contract on renewal based on actual data exchange volume; consolidate B2B
      partner connections where possible.
  - name: Accountability
    description: Utility-IT and partner-management owners review contract performance and renewal terms.
