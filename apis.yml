aid: ugi
url: https://raw.githubusercontent.com/api-evangelist/ugi/refs/heads/main/apis.yml
name: UGI Corporation
description: >-
  UGI Corporation is a Fortune 500 international energy distribution and services company
  headquartered in King of Prussia, Pennsylvania. UGI distributes natural gas, liquid
  propane, and electricity primarily through four business segments: UGI Utilities (natural
  gas and electric distribution in Pennsylvania), AmeriGas Propane (largest US propane
  marketer), Midstream and Marketing, and UGI International (European energy distribution).
  No public developer API has been identified; the company primarily uses EDI and utility
  industry standards for B2B data exchange.
