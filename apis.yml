apis:
  - aid: ugi:ugi-utilities
    name: UGI Utilities
    description: >-
      UGI Utilities provides natural gas and electric distribution services to
      approximately 700,000 customers in 45 counties in Pennsylvania and one county
      in Maryland. Residential and commercial customers can manage accounts online,
      start or stop service, pay bills, and enroll in energy assistance programs.
      No public REST API documented.
    humanURL: https://www.ugi.com
