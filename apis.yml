  - aid: ugi:ugi-energy-services
    name: UGI Energy Services
    description: >-
      UGI Energy Services (UGIES) is a competitive natural gas and electricity supplier
      and midstream service provider for commercial and industrial customers in the
      northeastern United States. Offers energy procurement, supply, and management services.
    humanURL: https://ugies.com
    tags:
