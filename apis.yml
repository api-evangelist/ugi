  - aid: ugi:amerigas
    name: AmeriGas Propane
    description: >-
      AmeriGas is the largest retail propane marketer in the United States, serving
      approximately 1.5 million residential, commercial, industrial, and agricultural
      customers across all 50 states. A wholly-owned subsidiary of UGI Corporation.
      Limited public API access; propane delivery ordering and account management
      available via web portal.
    humanURL: https://www.amerigas.com
